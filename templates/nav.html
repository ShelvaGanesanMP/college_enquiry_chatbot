<!DOCTYPE html>
<html>
<head>
  <title>Navigation Bar Example</title>
  <style>
    /* Style the navigation bar */
    .navbar {
      background-color: #333;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
    }

    /* Style the links inside the navigation bar */
    .navbar a {
      color: white;
      text-align: left;
      text-decoration: none;
      margin-right: 20px;
    }

    /* Change the color of links on hover */
    .navbar a:hover {
      background-color: #ddd;
      color: black;
    }

    /* Style the heading */
    .navbar h1 {
      margin: 0;
      color: white;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- Navigation bar -->
  <div class="navbar">
    <h1>P.A.S INTERNATIONAL COLLEGE</h1>
    <div>
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Library</a>
    </div>
  </div>

  <!-- Page content -->
  <div style="padding:16px">
    <h2>Navigation Bar Example</h2>
    <p>This is an example of a navigation bar.</p>
  </div>

</body>
</html>
